<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Miuki — Админ панель</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;400;600;800&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --red: #E8001D;
  --red-dark: #B50018;
  --bg: #F7F7F9;
  --bg2: #FFFFFF;
  --text: #1A0A0A;
  --text2: #4A1A1A;
  --text3: #9A6060;
  --border: rgba(232,0,29,0.15);
  --shadow: rgba(232,0,29,0.1);
  --soft: #FFE4E4;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--text); }

/* SIDEBAR */
.sidebar {
  position: fixed; top: 0; left: 0; bottom: 0; width: 240px;
  background: #1A0A0A; padding: 28px 0;
  display: flex; flex-direction: column;
  z-index: 100;
}
.sidebar-logo {
  display: flex; align-items: center; gap: 10px;
  padding: 0 24px 28px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
  margin-bottom: 16px;
}
.sidebar-logo span {
  font-family: 'Unbounded', sans-serif; font-weight: 800;
  font-size: 16px; color: var(--red);
}
.sidebar-logo small {
  display: block; font-size: 10px;
  color: rgba(255,255,255,0.35); font-weight: 400;
  letter-spacing: 0.05em;
}
.nav-item {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 24px; cursor: pointer;
  color: rgba(255,255,255,0.5); font-size: 13px; font-weight: 600;
  transition: 0.2s; border-left: 3px solid transparent;
}
.nav-item:hover { color: #fff; background: rgba(255,255,255,0.05); }
.nav-item.active { color: #fff; border-left-color: var(--red); background: rgba(232,0,29,0.08); }
.nav-item svg { width: 17px; flex-shrink: 0; }

/* MAIN */
.main { margin-left: 240px; min-height: 100vh; }
.topbar {
  background: #fff; padding: 0 32px; height: 64px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 50;
}
.topbar-title { font-family: 'Unbounded', sans-serif; font-weight: 700; font-size: 15px; }
.topbar-right { display: flex; align-items: center; gap: 12px; }
.btn {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 9px 20px; border-radius: 100px; border: none;
  font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 13px;
  cursor: pointer; transition: 0.2s;
}
.btn-primary { background: var(--red); color: #fff; }
.btn-primary:hover { background: var(--red-dark); transform: translateY(-1px); }
.btn-ghost { background: var(--soft); color: var(--red); }
.btn-ghost:hover { background: #ffd0d0; }
.btn-danger { background: #fff0f0; color: #cc0000; }
.btn-danger:hover { background: #ffe0e0; }
.btn svg { width: 14px; }

.content { padding: 28px 32px; }

/* STATS */
.stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 28px; }
.stat-box {
  background: #fff; border-radius: 14px; padding: 20px 22px;
  border: 1px solid var(--border);
}
.stat-box-num { font-family: 'Unbounded', sans-serif; font-size: 26px; font-weight: 800; color: var(--red); }
.stat-box-lbl { font-size: 12px; color: var(--text3); font-weight: 600; margin-top: 3px; }

/* FILTERS */
.filters {
  background: #fff; border-radius: 14px; padding: 16px 20px;
  border: 1px solid var(--border); margin-bottom: 20px;
  display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
}
.search-input {
  flex: 1; min-width: 200px; padding: 9px 16px; border-radius: 100px;
  border: 1.5px solid var(--border); font-family: 'Nunito', sans-serif;
  font-size: 13px; outline: none; transition: border-color 0.2s;
}
.search-input:focus { border-color: var(--red); }
.filter-select {
  padding: 9px 16px; border-radius: 100px;
  border: 1.5px solid var(--border); font-family: 'Nunito', sans-serif;
  font-size: 13px; outline: none; background: #fff; cursor: pointer;
}
.filter-select:focus { border-color: var(--red); }

/* TABLE */
.table-wrap {
  background: #fff; border-radius: 16px;
  border: 1px solid var(--border); overflow: hidden;
}
table { width: 100%; border-collapse: collapse; }
thead { background: #FFF5F5; }
th {
  padding: 13px 16px; text-align: left;
  font-size: 11px; font-weight: 700; color: var(--text3);
  text-transform: uppercase; letter-spacing: 0.08em;
  border-bottom: 1px solid var(--border);
}
td {
  padding: 13px 16px; font-size: 13px;
  border-bottom: 1px solid rgba(232,0,29,0.06);
  vertical-align: middle;
}
tr:last-child td { border-bottom: none; }
tr:hover td { background: #FFFAFA; }
.product-img {
  width: 44px; height: 44px; border-radius: 10px;
  object-fit: cover; background: var(--soft);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; flex-shrink: 0;
}
.product-img img { width: 44px; height: 44px; border-radius: 10px; object-fit: cover; }
.product-name { font-weight: 700; font-size: 13px; color: var(--text); }
.product-desc { font-size: 11.5px; color: var(--text3); margin-top: 2px; }
.badge {
  display: inline-block; padding: 3px 11px; border-radius: 100px;
  font-size: 11px; font-weight: 700;
}
.badge-green { background: #e6f9f0; color: #1a8a4a; }
.badge-red   { background: #fff0f0; color: #cc0000; }
.badge-cat   { background: var(--soft); color: var(--red); }
.price-cell  { font-family: 'Unbounded', sans-serif; font-weight: 700; font-size: 13px; color: var(--text); }
.actions { display: flex; gap: 6px; }

/* MODAL */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.45);
  z-index: 200; display: none; align-items: center; justify-content: center;
  backdrop-filter: blur(4px);
}
.modal-overlay.open { display: flex; }
.modal {
  background: #fff; border-radius: 20px; width: 560px; max-width: 95vw;
  max-height: 90vh; overflow-y: auto;
  padding: 32px; box-shadow: 0 24px 64px rgba(0,0,0,0.18);
  animation: modalIn 0.25s cubic-bezier(.16,1,.3,1);
}
@keyframes modalIn { from { opacity:0; transform:scale(0.95) translateY(16px); } to { opacity:1; transform:scale(1) translateY(0); } }
.modal-title {
  font-family: 'Unbounded', sans-serif; font-weight: 800;
  font-size: 18px; margin-bottom: 24px; color: var(--text);
}
.modal-title span { color: var(--red); }
.form-group { margin-bottom: 16px; }
.form-label { font-size: 12px; font-weight: 700; color: var(--text2); margin-bottom: 6px; display: block; text-transform: uppercase; letter-spacing: 0.06em; }
.form-input, .form-select, .form-textarea {
  width: 100%; padding: 11px 16px; border-radius: 12px;
  border: 1.5px solid var(--border); font-family: 'Nunito', sans-serif;
  font-size: 13px; outline: none; transition: border-color 0.2s;
  background: #fff;
}
.form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--red); }
.form-textarea { min-height: 80px; resize: vertical; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.img-preview {
  width: 100%; height: 160px; border-radius: 12px;
  border: 2px dashed var(--border); display: flex;
  align-items: center; justify-content: center;
  flex-direction: column; gap: 8px; cursor: pointer;
  color: var(--text3); font-size: 12px; font-weight: 600;
  overflow: hidden; transition: border-color 0.2s;
}
.img-preview:hover { border-color: var(--red); color: var(--red); }
.img-preview img { width: 100%; height: 100%; object-fit: cover; }
.modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; }

/* TOAST */
.toast {
  position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(20px);
  background: #1A0A0A; color: #fff; padding: 13px 26px; border-radius: 100px;
  font-size: 13px; font-weight: 600; opacity: 0; pointer-events: none;
  transition: 0.3s; z-index: 999; display: flex; align-items: center; gap: 8px;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.success { background: #1a8a4a; }
.toast.error   { background: var(--red); }

/* EMPTY */
.empty-state {
  text-align: center; padding: 60px 20px; color: var(--text3);
}
.empty-state svg { margin: 0 auto 14px; opacity: 0.3; }
.empty-state strong { display: block; font-family: 'Unbounded', sans-serif; font-size: 16px; color: var(--text); margin-bottom: 6px; }

.loading { text-align: center; padding: 40px; color: var(--text3); font-size: 14px; }
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-logo">
    <div>
      <span>MIUKI</span>
      <small>Админ панель</small>
    </div>
  </div>
  <div class="nav-item active">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
    Товары
  </div>
</div>

<div class="main">
  <div class="topbar">
    <div class="topbar-title" id="pageTitle">Управление товарами</div>
    <div class="topbar-right">
      <button class="btn btn-primary" onclick="openModal()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Добавить товар
      </button>
    </div>
  </div>

  <div class="content">
    <div class="stats-row" id="statsRow">
      <div class="stat-box"><div class="stat-box-num" id="statTotal">—</div><div class="stat-box-lbl">Всего товаров</div></div>
      <div class="stat-box"><div class="stat-box-num" id="statInStock">—</div><div class="stat-box-lbl">В наличии</div></div>
      <div class="stat-box"><div class="stat-box-num" id="statOutStock">—</div><div class="stat-box-lbl">Нет в наличии</div></div>
      <div class="stat-box"><div class="stat-box-num" id="statCats">—</div><div class="stat-box-lbl">Категорий</div></div>
    </div>

    <div class="filters">
      <input class="search-input" type="text" placeholder="🔍 Поиск по названию..." id="searchInput" oninput="filterProducts()">
      <select class="filter-select" id="categoryFilter" onchange="filterProducts()">
        <option value="">Все категории</option>
      </select>
      <select class="filter-select" id="stockFilter" onchange="filterProducts()">
        <option value="">Любой статус</option>
        <option value="1">В наличии</option>
        <option value="0">Нет в наличии</option>
      </select>
    </div>

    <div class="table-wrap">
      <div class="loading" id="loadingState">Загрузка...</div>
      <table id="productsTable" style="display:none;">
        <thead>
          <tr>
            <th>Фото</th>
            <th>Название</th>
            <th>Категория</th>
            <th>Цена</th>
            <th>Наличие</th>
            <th>Действия</th>
          </tr>
        </thead>
        <tbody id="productsBody"></tbody>
      </table>
      <div class="empty-state" id="emptyState" style="display:none;">
        <svg width="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/></svg>
        <strong>Товары не найдены</strong>
        Попробуй изменить фильтры или добавь новый товар
      </div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
  <div class="modal">
    <div class="modal-title" id="modalTitle">Добавить <span>товар</span></div>
    <form id="productForm" onsubmit="saveProduct(event)">
      <input type="hidden" id="productId">

      <div class="form-group">
        <label class="form-label">Фото товара</label>
        <div class="img-preview" id="imgPreview" onclick="document.getElementById('imageInput').click()">
          <svg width="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          Нажми чтобы загрузить фото
        </div>
        <input type="file" id="imageInput" accept="image/*" style="display:none" onchange="previewImage(event)">
      </div>

      <div class="form-group">
        <label class="form-label">Название *</label>
        <input class="form-input" type="text" id="fieldName" placeholder="Например: Pocky шоколадные" required>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Категория *</label>
          <select class="form-select" id="fieldCategory" required>
            <option value="">Выбери категорию</option>
            <option>Игрушки</option>
            <option>Туалетная вода</option>
            <option>Бижутерия</option>
            <option>Косметика</option>
            <option>Канцелярия</option>
            <option>Азиатские снеки</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Цена (₽) *</label>
          <input class="form-input" type="number" id="fieldPrice" placeholder="0" min="0" required>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Описание</label>
        <textarea class="form-textarea" id="fieldDescription" placeholder="Краткое описание товара..."></textarea>
      </div>

      <div class="form-group">
        <label class="form-label">Наличие</label>
        <select class="form-select" id="fieldInStock">
          <option value="true">✅ В наличии</option>
          <option value="false">❌ Нет в наличии</option>
        </select>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-ghost" onclick="closeModal()">Отмена</button>
        <button type="submit" class="btn btn-primary" id="saveBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
          Сохранить
        </button>
      </div>
    </form>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = 'https://miuki-backend.onrender.com';
let allProducts = [];
let editingId   = null;

async function loadProducts() {
  try {
    const res  = await fetch(`${API}/api/products`);
    allProducts = await res.json();
    renderProducts(allProducts);
    updateStats(allProducts);
    updateCategoryFilter(allProducts);
    document.getElementById('loadingState').style.display  = 'none';
    document.getElementById('productsTable').style.display = 'table';
  } catch(e) {
    document.getElementById('loadingState').textContent = '❌ Не удалось подключиться к серверу. Запусти python app.py';
  }
}

function updateStats(products) {
  const inStock  = products.filter(p => p.in_stock).length;
  const cats     = new Set(products.map(p => p.category)).size;
  document.getElementById('statTotal').textContent    = products.length;
  document.getElementById('statInStock').textContent  = inStock;
  document.getElementById('statOutStock').textContent = products.length - inStock;
  document.getElementById('statCats').textContent     = cats;
}

function updateCategoryFilter(products) {
  const cats   = [...new Set(products.map(p => p.category))];
  const select = document.getElementById('categoryFilter');
  const cur    = select.value;
  select.innerHTML = '<option value="">Все категории</option>';
  cats.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c; opt.textContent = c;
    if (c === cur) opt.selected = true;
    select.appendChild(opt);
  });
}

function filterProducts() {
  const search   = document.getElementById('searchInput').value.toLowerCase();
  const category = document.getElementById('categoryFilter').value;
  const stock    = document.getElementById('stockFilter').value;
  const filtered = allProducts.filter(p => {
    const matchSearch   = !search   || p.name.toLowerCase().includes(search) || (p.description||'').toLowerCase().includes(search);
    const matchCategory = !category || p.category === category;
    const matchStock    = stock === '' || String(p.in_stock) === stock;
    return matchSearch && matchCategory && matchStock;
  });
  renderProducts(filtered);
}

function renderProducts(products) {
  const tbody = document.getElementById('productsBody');
  const empty = document.getElementById('emptyState');
  if (!products.length) {
    tbody.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';
  tbody.innerHTML = products.map(p => `
    <tr>
      <td>
        <div class="product-img">
          ${p.image_url
            ? `<img src="${API}${p.image_url}" alt="${p.name}">`
            : '📦'}
        </div>
      </td>
      <td>
        <div class="product-name">${p.name}</div>
        <div class="product-desc">${p.description || '—'}</div>
      </td>
      <td><span class="badge badge-cat">${p.category}</span></td>
      <td><span class="price-cell">${p.price.toLocaleString('ru-RU')} ₽</span></td>
      <td><span class="badge ${p.in_stock ? 'badge-green' : 'badge-red'}">${p.in_stock ? 'В наличии' : 'Нет'}</span></td>
      <td>
        <div class="actions">
          <button class="btn btn-ghost" onclick="editProduct(${p.id})" style="padding:7px 14px;font-size:12px;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            Изменить
          </button>
          <button class="btn btn-danger" onclick="deleteProduct(${p.id})" style="padding:7px 14px;font-size:12px;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>
            Удалить
          </button>
        </div>
      </td>
    </tr>
  `).join('');
}

function openModal(product = null) {
  editingId = product ? product.id : null;
  document.getElementById('modalTitle').innerHTML = product
    ? 'Редактировать <span>товар</span>'
    : 'Добавить <span>товар</span>';
  document.getElementById('productId').value       = product?.id || '';
  document.getElementById('fieldName').value       = product?.name || '';
  document.getElementById('fieldCategory').value   = product?.category || '';
  document.getElementById('fieldPrice').value      = product?.price || '';
  document.getElementById('fieldDescription').value= product?.description || '';
  document.getElementById('fieldInStock').value    = product?.in_stock ? 'true' : 'false';
  const preview = document.getElementById('imgPreview');
  preview.innerHTML = product?.image_url
    ? `<img src="${API}${product.image_url}">`
    : `<svg width="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>Нажми чтобы загрузить фото`;
  document.getElementById('imageInput').value = '';
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }
function closeModalOutside(e) { if (e.target === document.getElementById('modalOverlay')) closeModal(); }

function previewImage(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    document.getElementById('imgPreview').innerHTML = `<img src="${e.target.result}">`;
  };
  reader.readAsDataURL(file);
}

async function editProduct(id) {
  const product = allProducts.find(p => p.id === id);
  if (product) openModal(product);
}

async function saveProduct(e) {
  e.preventDefault();
  const btn = document.getElementById('saveBtn');
  btn.disabled = true; btn.textContent = 'Сохраняю...';
  const fd = new FormData();
  fd.append('name',        document.getElementById('fieldName').value);
  fd.append('category',    document.getElementById('fieldCategory').value);
  fd.append('price',       document.getElementById('fieldPrice').value);
  fd.append('description', document.getElementById('fieldDescription').value);
  fd.append('in_stock',    document.getElementById('fieldInStock').value);
  const imageFile = document.getElementById('imageInput').files[0];
  if (imageFile) fd.append('image', imageFile);
  try {
    const url    = editingId ? `${API}/api/products/${editingId}` : `${API}/api/products`;
    const method = editingId ? 'PUT' : 'POST';
    const res    = await fetch(url, { method, body: fd });
    if (res.ok) {
      showToast(editingId ? '✅ Товар обновлён!' : '✅ Товар добавлен!', 'success');
      closeModal();
      loadProducts();
    } else {
      showToast('❌ Ошибка сохранения', 'error');
    }
  } catch(err) {
    showToast('❌ Нет связи с сервером', 'error');
  }
  btn.disabled = false;
  btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="14"><polyline points="20 6 9 17 4 12"/></svg> Сохранить';
}

async function deleteProduct(id) {
  if (!confirm('Удалить этот товар?')) return;
  try {
    const res = await fetch(`${API}/api/products/${id}`, { method: 'DELETE' });
    if (res.ok) {
      showToast('🗑️ Товар удалён', 'success');
      loadProducts();
    }
  } catch(e) {
    showToast('❌ Ошибка удаления', 'error');
  }
}

function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className   = `toast ${type} show`;
  setTimeout(() => t.classList.remove('show'), 3000);
}

loadProducts();
</script>
</body>
</html>
